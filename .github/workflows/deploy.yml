name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /home/nguyenhoangven97/deploy_docker_demo
            cd /home/nguyenhoangven97/deploy_docker_demo
            git fetch --all
            git reset --hard origin/main
            git log -1 --oneline
            docker-compose down
            docker system prune -f
            docker-compose up -d --build --force-recreate