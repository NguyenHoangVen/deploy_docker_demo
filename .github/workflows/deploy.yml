name: Deploy to VPS

on:
  push:
    branches:
      - main # Trigger the workflow on push to the main branch
  workflow_dispatch:  # Allow manual triggering of the workflow from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master 
        with:
          host: ${{ secrets.VPS_HOST }} # The IP address or hostname of your VPS, stored as a secret in GitHub
          username: ${{ secrets.VPS_USER }} # The SSH username for your VPS, stored as a secret in GitHub
          key: ${{ secrets.VPS_SSH_KEY }} # The private SSH key for authentication, stored as a secret in GitHub
          script: |
            git config --global --add safe.directory /home/nguyenhoangven97/deploy_docker_demo
            cd /home/nguyenhoangven97/deploy_docker_demo
            git fetch --all
            git reset --hard origin/main
            git log -1 --oneline
            docker-compose down
            docker system prune -f
            docker-compose up -d --build --force-recreate